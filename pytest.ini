[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    slow: tests that load real PDB/PKL files (>2s)
    regression: tests that verify exact numerical outputs
    integration: tests spanning multiple modules
    future: placeholder tests for unimplemented features
    cli: tests that invoke CLI entry points via subprocess
    database: tests for PPI database loading and ID mapping
    multiprocessing: tests for parallel processing with ProcessPoolExecutor
addopts = -v --tb=short -m "not future"
