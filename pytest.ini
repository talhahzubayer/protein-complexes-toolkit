[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    slow: tests that load real PDB/PKL files (>2s)
    regression: tests that verify exact numerical outputs
    integration: tests spanning multiple modules
    future: placeholder tests for unimplemented features
    cli: tests that invoke CLI entry points via subprocess
    database: tests for PPI database loading and ID mapping
    multiprocessing: tests for parallel processing with ProcessPoolExecutor
    api: STRING API module tests (mocked, no network)
    clustering: tests for protein clustering and homology analysis
    variants: tests for variant mapping to interface residues
    stability: stability scoring tests (EVE evolutionary predictions)
    protvar: ProtVar API cross-validation tests (scores, interactions, FoldX)
    alphamissense: AlphaMissense offline pathogenicity scoring tests
    disease: disease annotation tests (UniProt disease, PTM, GO, drug target)
    pathways: pathway mapping and network analysis tests
addopts = -v --tb=short -m "not future"
